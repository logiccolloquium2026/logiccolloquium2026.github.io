    - time: "17:00"
      type: "plenary"
      title: "Godel Lecture: Logical & Mathematical Conventionalism"
      speaker: John Burgess
      id: "john-burgess"
      abstract: |
                The 1930 Königsberg conference began with a symposium on logicism, intuitionism, and formalism, but also included other events at one of which Gödel announced his first incompleteness theorem. Its importance was not instantly recognized on that occasion, but it was soon to create difficulties for all three leading schools. Yet even after those three schools faded, something of the spirit of logicism lived on among philosophers in conventionalism, of which Carnap, who had represented logicism at the symposium, became the most influential advocate. Among philosophers, if not logicians, conventionalism was arguably something like the received view right through the 1950s, until criticism by Quine and others eventually led to its being almost universally abandoned. Recently, however, there has been a revival of conventionalism, both about logic and about mathematics, and some highlights of recent developments will be addressed in this lecture.
