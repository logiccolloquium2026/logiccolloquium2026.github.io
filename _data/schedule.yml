        - name: "Intuitionistic Set Theory/Philosophy"
          room: "Theory lab (209)"
          talks:
            - time: "15:45"
              title: "Indexed hierarchies and internal structure in the ordinal class in intuitionistic set theories"
              speaker: "Shuwei Wang"
              id: "wang-set"
            - time: "16:05"
              title: "Independence of premise for IZF"
              speaker: "Patrick Uftring"
              id: "uftring-set"
            - time: "16:25"
              title: "Conceptions of sets and classes in a class theory with a universal set"
              speaker: "Simone Picenni"
              id: "picenni-set"
              abstract: |
                        Following Forster [2] and Button [1], I consider an iterative construction of the set-theoretic universe in which, at each stage, we form all sets of previously available objects and their complements, yielding a universe with a universal set and self-membered sets. I axiomatise these ideas in a Forsterian Set Theory and a Forsterian Class Theory, the latter allowing proper classes to be members of sets.

                        I next revisit the distinction between sets and classes in the context of class theories with a universal set, refining the indefinite extensibility account of this distinction [3, 6]. On the proposed picture, concepts that determine sets are those whose extension is not indefinitely extensible or whose anti-extension is not indefinitely extensible; concepts whose extension and anti-extension are indefinitely extensible correspond to proper classes. A modal potentialist framework to precisify these ideas is developed along the lines of Studd [6] and Linnebo [4]. I conclude by relating this framework to Schindler’s [5] distinction between total and partial classes.

                        [1] T. Button, Wand/Set theories., The Journal of Symbolic Logic, vol. 91 (2024), no. 1, pp. 248–287.
                        [2] T. Forster, The iterative conception of set, The Review of Symbolic Logic, vol. 1 (2008), no. 1, pp. 97–110.
                        [3] L. Incurvati, Conceptions of Set and the Foundations of Mathematics, Cambridge University Press, Cambridge, 2020.
                        [4] Ø. Linnebo, The potential hierarchy of sets, The Review of Symbolic Logic, vol. 6 (2013), no. 2, pp. 205–228.
                        [5] T. Schindler, Classes, why and how, Philosophical Studies, vol. 176 (2019), no. 2, pp. 407–435.
                        [6] J. P. Studd, Everything, More or Less, Oxford University Press, Oxford, 2019.
    - time: "16:45"
