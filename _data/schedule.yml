              speaker: "Andreas Weiermann"
              id: "andreas-weiermann"
              time: "11:40"
            - title: "Separation of induction and collection axiom in bounded arithmetic with student-teacher games"
              speaker: "Dimitrios Tsintsilidas"
              id: "dimitrios-tsintslidias"
              time: "12:00"
            - title: "Double negation elimination and the multiple succedent structure of LK"
              speaker: "Nox Cowie"
              id: "nox-cowie"
              time: "12:20"
              abstract: |
                        The classical natural deduction system $N K$ can be obtained from the intuitionistic $N J$ by adding a double negation elimination inference rule. On the other hand, the intuitionistic and classical sequent calculi $LJ$ and $LK$ are differentiated by the number of formulae that can be contained in the right-hand side of a sequent. In an $LJ$-derivation, the right-hand side of a sequent can contain at most one formula; $LK$is obtained by lifting this restriction. This distinction between $LJ$ and $LK$ is notably different from that between $N J$ and $N K$: the first being purely structural and the second involving the addition of a classical inference pattern. We demonstrate how the classical strength of double negation elimination emerges from right multiplicity by examining the relationship between derivations in natural deduction and sequent calculus and applications of their respective implication and negation rules. This clarifies how multiplicity constitutes a counterpart to double negation elimination.

                        [1] A.G. Dragalin, Mathematical Intuitionism: Introduction to Proof Theory. Translations of Mathematical Monographs, American Mathematical Society, (1988).
                        [2] D.M. Gabbay and N. Olivetti, Goal Directed Proof Theory. Applied Logic Series, Springer Dordrecht, (2000).
                        [3] G. Gentzen, Untersuchungen  ̈uber das logische Schließen., The Collected Papers of Gerhard Gentzen (Szabo, M. E., editor), North-Holland Publishing Company, Amsterdam, (1969), pp. 68–131.
                        [4] S.C. Kleene, Introduction to Metamathematics. North-Holland Publishing Company, (1952).
                        [5] S. Maehara, Eine Darstellung der Intuitionistischen Logik in der Klassischen.,Nagoya Mathematical Journal, vol. 7 (1954), pp. 45–64.
                        [6] P. Milne, Harmony, purity, simplicity and a “seemingly magical fact.”, The Monist, vol. 85 (2002), no. 4, pp. 498-534.
                        [7] V. de Paiva and L. Pereira, A short note on intuitionistic propositional logic with multiple conclusions., Manuscrito, vol. 28 (2005), no. 2, pp. 317–329.
                        [8] G. Restall, Structural rules in natural deduction with alternatives., Bulletin of the Section of Logic, vol. 52 (2023), no. 2, pp. 109–143.
