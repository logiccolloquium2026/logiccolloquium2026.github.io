- id: "wednesday"
  name: "Wednesday, July 1"
  blocks:
    - time: "09:15"
      type: "plenary"
      room: "Lecture Room 002"
      speaker: "Liron Cohen"
      title: "The Effects of Effects on Constructivism"
      id: "liron-cohen"
      abstract: |
                Constructivism begins with the promise that truth has computational meaning. Yet our standard picture of constructive validity grew out of a pure model of computation, inherited from the lambda calculus. Is this purity a foundational necessity, or merely a historical convenience? Today, computation is effectful: programs store state, branch nondeterministically, raise exceptions, interact with environments, sample randomly, and manipulate continuations. If constructive foundations are meant to explain computation, rather than idealize it away, then effects must move from the margins into the logical core. In this talk, I will argue that effects are not obstacles to constructivism. They are the structure that a modern constructivism should be built from. Once effects are admitted, they reshape the validity of logical principles: sometimes breaking them, sometimes restoring them, and often revealing distinctions that pure foundations hide. I will illustrate this through examples involving choice, continuity, and Markov’s principle. What emerges is not a weaker constructivism, but a more honest one: a constructivism whose logical principles are grounded in the actual structure of computation.
    - time: "10:15"
      type: "break"
      title: "Coffee break"
    - time: "10:45"
      type: "special"
      title: "Special Sessions"
      id: "set-type-theory"
      tracks:
        - name: "Set Theory"
          organisers: Boban Velickovic (Paris) and Matteo Viale (Turin)
          room: "Robert Recorde (102)"
          talks:
            - time: "10:45"
              title: "The directedness of the Rudin--Keisler order on measurable cardinals"
              speaker: "Alejandro Poveda"
              id: "poveda-set-theory"
              abstract: |
                        There is a long-standing project aimed at classifying ultrafilters. One of the most successful tools in this endeavor has been the Rudin-Keisler order $\leq_{\mathrm{RK}}$. A central feature of the Rudin-Keisler order is that it provides a framework for understanding the intrinsic structure of an ultrafilter through its relative position within the order. For instance, selective (a.k.a. Ramsey) ultrafilters are those that are $\leq_{\mathrm{RK}}$-minimal. In this talk we will focus on the directedness of $\leq_{\mathrm{RK}}$ on the set of $\kappa$-complete ultrafilters on $\kappa$, $\mathfrak{U}_\kappa$. Classical theorems of Kunen and, independently, Comfort?Negrepontis deduce the directedness of $\leq_{\mathrm{RK}}$ from instances of compactness; for instance, if $\kappa$ is $\kappa$-compact then $\langle \mathfrak{U}_\kappa, \leq_{\mathrm{RK}}\rangle$ is $(2^\kappa)^+$-directed. On the other hand, it can be showed that, if there is no inner model for a Woodin cardinal, $\langle \mathfrak{U}_\kappa, \leq_{\mathrm{RK}}\rangle$ fails to be $\sigma$-directed whenever $\kappa$ is the first strong cardinal $\kappa$ in the core model.  

                        In light of these, a natural conjecture is that the directedness of the Rudin-Keisler order at measurable cardinals can only be produced from large cardinals in the realm of $\kappa$-compactness or strong compactness. In joint work with Yair Hayut, we refute this by proving that the $\kappa^+$-directedness of $\leq_{\mathrm{RK}}$ over $\kappa$-complete ultrafilters is equiconsistent with the existence of a cardinal $\kappa$ with Mitchell order $\kappa$. This is obtained after bridging the directedness of $\leq_{\mathrm{RK}}$ with a new principle (The Gluing Property) and showing that the latter can be forced, from optimal assumptions, using nonstationary support iterations of Prikry-type forcings.
              
            - time: "11:25"
              title: "The Knaster continuum homeomorphism group"
              speaker: "Sumun Iyer"
              id: "iyer-set-theory"
              abstract: | 
                        A Knaster continuum is one which can be written as an inverse limit of intervals $[0,1]$ where each bonding map is a continuous open surjection mapping $0$ to $0$. Knaster continua are examples of indecomposable continua, they cannot be written as the union of two proper subcontinua. The universal Knaster continuum, $K$, is a Knaster continuum which continuously surjects onto any Knaster continuum. The group $\mathrm{Homeo}(K)$ of homeomorphisms of K is a non-locally compact Polish group. The main theorem is that $\mathrm{Homeo}(K)$ contains an open subgroup with a comeager conjugacy class.
              
            - time: "12:05"
              title: "A dichotomy for transitive lists"
              speaker: "Borisa Kuzeljevic"
              id: "kuzeljevic-set-theory"
              abstract: |
                        This talk presents a joint work with Roy Shalev and Stevo Todorˇcevi´c. We will for- mulate, for any regular cardinal λ, a transitive list dichotomy LD(λ+,λ) and show that LD(ω2,ω1) is consistent with CH assuming the existence of a weakly compact cardinal, while LD(ω1,ω) is a consequence of MAℵ1 . This dichotomy is a direct generalization of the statement that every λ+-Aronszajn tree is special, and it implies, for example: that every λ+-tower in (P(λ),⊆∗) is Hausdorff, the nonexistence of λ+-Souslin lower semi- lattices, the nonexistence of certain strongly unbounded colorings (assuming λ<λ = λ), and the nonexistence of (λ+,λ+)-T-gaps in P(λ).

        - name: "Type Theory"
          organisers: "Fredrik Nordvall Forsberg (Strathclyde) and Nicolai Kraus (Nottingham)"
          room: "Lecture Room 002"
          talks:
            - time: "10:45"
              title: "Revisiting Hofmann's setoid model"
              speaker: "Loïc Pujet"
              id: "escardo-type-theory"
              abstract: |
                        In his seminal PhD thesis, Martin Hofmann proposed two definitions of the setoid model of type theory in the language of intensional type theory itself, in order to recover extensionality principles such as function extensionality, proposition extensionality and quotient types. Unfortunately, due to the lack of extensionality, his models only validates some of the rules of type theory up to setoid equality. In this talk, I will present a variation on Hofmann's S1 model which sidesteps the lack of extensionality, and supports all of the constructors of type theory as well as the desired extensionality principles without destroying the computational content of equality proofs. I will discuss the consequences of this model on constructive fragments of the axiom of choice, proof erasure, and impredicativity. I will also draw parallels with models of univalent type theory in cubical and semi-cubical sets.A hands-on review of type theory workflows exploiting univalence principles. 

                        We demonstrate verification routines directly inside modern computational proof assistants.
                        
            - time: "11:25"
              title: "Functional Data Structures in Monoidal Categories"
              speaker: "Zhixuan Yang"
              id: "yang-type-theory"
              abstract: |
                        An achievement of functional programming is the invention of many efficient purely functional data structures and algorithms. Motivated by the observation that many of these data structures and algorithms can be typed in linear type systems, in this talk I will show my ongoing work of studying functional data structures at the generality of monoidal categories. This generalisation unlocks the door to a strange new world of data structures: lists and free monoids no longer need to be isomorphic in non- closed monoidal categories; cons-lists and snoc-lists no longer need to coincide in non- symmetric monoidal categories; the time complexities of accessing the two components of a monoidal product may be different; and pattern matching may only be possible for the first variable of a context, but not the others, in categories where the monoidal product only distributes from the right but not the left.

                        As an application of this generalisation, I will show how Chris Okasaki’s catenable lists [1] can be typed in a certain non-commutative linear type system and interpreted in the category of endofunctors. This gives us a data structure of abstract syntax trees that supports amortised constant-time-per-variable substitution, eliminating the cost of traversing the inner nodes of the syntax tree, which might be of interest for efficient implementations of type theories and programming languages.

                        [1] Chris Okasaki, Purely Functional Data Structures, Cambridge University Press, 1998.
                
            - time: "12:05"
              title: "Containers in Computable Analysis"
              speaker: "Ian Price"
              id: "ian-price-type-theory"
              abstract: |
                        Containers were introduced by Abbott et al. to formalise the idea of datatypes as templates into which data is stored [1]. Categories of containers have many good closure properties, including four natural monoidal operations and under initial algebras and terminal coalgebras. Moreover, containers are a mathematical structure that keep getting rediscovered; a post by Hedges claims nine independent rediscoveries [3].

                        Last year, Pradic and Price gave another such example: characterising Weihrauch reductions [2] as morphisms in the category of answerable containers over projective represented spaces [4]. As a consequence, much of the algebraic structure at play in Weihrauch complexity exists for general categorical reasons. However, the category of projectives is not locally cartesian closed, which means that the composition of problems exists only weakly.

                        To give a generic account of operators on the Weihrauch lattice definable by fix-points [5], such as the diamond operator and infinite parallelisation, we define a notion of fibred polynomial functor and prove the existence of initial algebras and terminal coalgebras. From the construction of those (co)algebras arises an intermediate fixpoint ζ which can be used to define some important Weihrauch degrees.

                        [1] Michael Abbott, Thorsten Altenkirch & Neil Ghani, Categories of Containers Foundations of Software Science and Computation Structures (Andrew Gordon, editors), Springer, Berlin, Heidelberg 2003 pp. 23–38.
                        [2] Vasco Brattka and Guido Gherardi & Arno Pauly Weihrauch Complexity in Computable Analysis Handbook of Computability and Complexity in Analysis (Vasco Brattka and Peter Hertling, editors), Springer Cham 2021 pp. 367–417.
                        [3] Jules Hedges Lenses for Philosophers https://julesh.com/posts/2018-08-16 lenses-for-philosophers.html
                        [4] Cecilia Pradic & Ian Price, Weihrauch Problems as Containers, Crossroads of Computability and Logic: Insights, Inspirations, and Innovations (Arnold Beckmann, Isabel Oitaven and Florin Manea, editors), LNCS, vol. 15764, Springer Cham, 2025 pp. 395-409
                        [5] Cecilia Pradic & Ian Price, Problems with Fixpoints of Polynomials of Polynomials, Forty-First Annual Symposium on Logic in Computer Science (to appear) 2026
