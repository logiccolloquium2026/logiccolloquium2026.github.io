        - name: "Philosophy of Mathematics"
          room: "Robert Recorde"
          talks:
            - time: "14:15"
              title: "Localising overgeneration: a three-strata decomposition of formal proof"
              speaker: "David Appadourai"
              id: "david-appaourai"
              abstract: |
                        Tanswell [2] argues that derivationist accounts of mathematical proof face an over-generation problem: informal proofs can be formalised in multiple, structurally non-equivalent ways, and this multiplicity undermines the philosophical significance of the proof–formalisation correspondence.

                        Tactic-based proof assistants like Lean and Coq make visible a three-strata decomposition that localises overgeneration. The strata are: (1) the informal proof (argumentative prose), (2) the tactic script (executable code that instructs the elaborator to construct a proof term), and (3) the proof term (a typed expression in the Calculus of Inductive Constructions verified by the kernel).

                        The transition from stratum 1 to stratum 2 introduces the multiplicity: one informal proof admits multiple tactic scripts, each reflecting different authorial choices about decomposition and generalisation. But the transition from stratum 2 to stratum 3 is deterministic relative to a fixed environment (Lean version, library commit, import graph): a given tactic script yields exactly one proof term. The elaborator is non-originating in a precise sense: unification and instance resolution work only on content already in the script or the environment.

                        This partition, developed through a Lean formalisation of IMO 2024 Problem 6, is an epistemological result: derivationist accounts must answer the selection question at the formaliser’s authored choices, not at the elaborator’s mechanical construction. The partition is visible only when the formal pole of the standard view [1] is decomposed into script and term.

                        [1] Y. Hamami, Mathematical rigor and proof, The Review of Symbolic Logic, vol. 15 (2022), no. 2, pp. 409–449.
                        [2] F. Tanswell, A problem with the dependence of informal proofs on formal proofs, Philosophia Mathematica, vol. 23 (2015), no. 3, pp. 295–310.
            - time: "14:35"
              title: "Model-theoretic inferentialism: the best of both worlds"
              speaker: "Chanwoo Lee and S. Kaan Tabakci"
              id: "lee-tabakci"
              abstract: |
                        What makes logical and mathematical terms meaningful? What are the meanings of logical and mathematical terms? We explore model-theoretic inferentialism, which combines an inferentialist answer to the metasemantic question (the former) and a denotation-based, model-theoretic answer to the semantic question (the latter). We characterize and defend model-theoretic inferentialism against rivaling accounts, especially orthodox denotationalism and orthodox inferentialism in logic and mathematics.

                        Model-theoretic inferentialism has many variations, so we offer a way to classify different variations of model-theoretic inferentialism based on the normative basis of correct inferences and the ontological status of model-theoretic entities. Then, we introduce the Categoricity Problem: a major formal problem for model-theoretic inferentialism where the model-theoretic meanings of logical and mathematical terms are not uniquely determined by the inferences of the standard systems. We discuss the solutions in the literature to uncover how they match up with different approaches to model-theoretic inferentialism, since not every solution serves every form of model-theoretic inferentialism equally well. Based on these considerations, we develop three philosophical accounts of model-theoretic inferentialism, which will help us better comprehend the relevant results in philosophy of logic and mathematics.

                        [1] Nuel D. Belnap and Gerald J. Massey, Semantic Holism, Studia Logica, vol. 49 (1990), no. 1, pp. 67–82.
                        [2] Dennis Bonnay and Dag Westerst˚ahl, Compositionality Solves Carnap’s Problem, Erkenntis, vol. 81 (2016), no. 4, pp. 721–739.
                        [3] Tim Button and Sean Walsh, Philosophy and Model Theory, Oxford University Press, 2018.
                        [4] Rudolph Carnap, Formalization of Logic, Harvard University Press, 1943.
                        [5] James Garson, What Logics Mean, Cambridge University Press, 2014.
                        [6] Julien Murzi and Brett Topey, Categoricity by Convention, Philosophical Studies, vol. 178 (2021), no. 10, pp. 3391–3420.
                        [7] Greg Restall, Truth Values and Proof Theory, Studia Logica, vol. 92 (2009), pp. 241–264.
                        [8] Sebastian Speitel, Carnap’s Categoricity Problem, The Bulletin of Symbolic Logic, to appear.
                        [9] S. Kaan Tabakci, Categoricity Problem for LP and K3, Studia Logica, vol. 112 (2024), no. 6, pp. 373-1407,
                        [10] Jarred Warren, Shadows of Syntax, Oxford University Press, 2020.
            - time: "14:55"
              title: "Theory of higher differentiable functionals and applications"
              speaker: "Stan Srednyak"
              id: "stan-srednyak"
              abstract: |
                        Quantum field theory is built on the notion of functionals defined on function spaces. Comparison of theory predictions with experiment requires interpreting data in appropriate functional spaces. We compare physical notions of functionals with mathematical notions of functionals. We then discuss our recent proposal that functionals arbitrarily high in the constructible hierarchy are in fact necessary for description of physical laws. Then we discuss which notions of analysis are necessary to be definable on these higher functional spaces in order for the theory to have predictive power. These notions include the notions of derivative and integral, and we discuss classes of functionals for which these notions can be defined. We provide an example of an infinitely tall tower of functionals which satisfy differential relations at each functional level. We show that if the differential relations have low complexity, then the same is true for the unique solution of these functional relations. This is a paradigmatic example of how higher functionals appear in description of physical systems.
            - time: "15:15"
              title: "Analyticity and contemporary formal theories: Hintikka's typology and the case of type theory"
              speaker: "Ramazan Ayupov"
              id: "ramazan-ayupov"
              abstract: |
                        This talk offers a critique of Jaakko Hintikka’s analysis of analyticity [2], from the perspective of Martin-Löf type theory. Hintikka distinguishes four types of analyticity: conceptual truth; subformulaic or structural analyticity; analyticity as reasoning that introduces no new entities; and analyticity as either tautological or informationally empty. Hintikka’s aim is to formalise a Kantian insight about mathematics: mathematical reasoning is synthetic because it requires construction and cannot be reduced to mere conceptual analysis. However, Hintikka fails to preserve Kantian constructive dimension of analyticity; it is this dimension that will be realized by Martin-Löf [3]. I argue that this Hintikka framework is insufficient for contemporary formal theories. Particularly Martin-Löf’s intuitionistic type theory and its subsequent reinterpretations. In MLTT, the analytic-synthetic distinction is formulated at the level of judgments rather than propositions or argument steps. This shift reveals forms of analyticity tied to proof, construction, hypothetical reasoning and, in later discussions, evaluation and computational semantics [1]. For this reason, MLTT cannot simply be fitted into Hintikka’s typology.

                        [1] Bruno Bentzen, Analyticity and Syntheticity in Type Theory Revisited, The Review of Symbolic Logic, vol. 7 (2024), no. 4, pp. 1119–1145.
                        [2] Jaakko Hintikka, An Analysis of Analylicity, Logic, Language-Games and Information: Kantian Themes in the Philosophy of Logic Oxford: Clarendon Press, 1973, pp. 123--149.
                        [3] Per Martin-Löf, Analytic and Synthetic Judgements in Type Theory, Kant and Contemporary Epistemology (Parrini, P., editor), The University of Western Ontario Series in Philosophy of Science, vol. 54, Dordrecht: Springer, 1994, pp. 87--100.

        - name: "Proof Theory"
          room: "Lecture Room 002"
          talks:
            - time: "14:15"
              title: "Bachmann-Howard from below"
              speaker: "Anton Setzer"
            - time: "14:35"
              title: "Skolemization and Herbrand's Theorem for intermediate logics over predicate abstraction"
              speaker: "Elio La Rosa"
              id: "elio-la-rosa"
              abstract: |
                        I present a new approach to Skolemization and proof of Herbrand’s Theorem for intermediate logics based on predicate abstraction. Predicate abstraction provides terms with a scoping mechanism allowing for de dicto and de re reading of modalities. As Fitting [3] noticed predicate abstractions are useful conservative extensions also for modal logics which cannot represent such distinctions but also cannot represent complete Skolemizations otherwise. In this talk, I show how modalities can be absorbed into predicate abstractions to provide a conservative extension for Intuitionistic and other intermediate logics. Semantically, the interpretation of Skolem functions then corresponds to an intensional version of Bazz and Iemhoff’s approach (e.g., [1]), using existence predicates. The term-scoping mechanism, however, allows for simplified proofs of completeness of Skolemization and a modular approach. The account is proof-theoretic, and based on the nested calculi for intermediate logics first presented by Ciabattoni et al. [2] and turned first-order by Lyon [4]. These calculi are thus extended to identity, predicate abstraction and non-rigid terms. Intuitionistic, Gödel-Dummett and Bunched Implication logics will be covered in their varying and constant domain versions.

                        [1] Matthias Baaz and Rosalie Iemhoff, Eskolemization in Intuitionistic Logic, Journal of Logic and Computation, vol. 21 (2011), no. 4, pp. 625–638.
                        [2] Agata Ciabattoni, Lutz Straßburger and Matteo Tesi, Taming Bounded Depth with Nested Sequents, AIML 2022 - Advances in Modal Logic (Rennes, France), (David Fernández-Duque, Alessandra Palmigiano and Sophie Pinchinat, editors) College Publications, 2022, pp. 199–216.
                        [3] Melvin Fitting, A Modal Logic Analog of Smullyan’s Fundamental Theorem, Mathematical Logic Quarterly, vol. 19 (1973), no. 1, pp. 1–16.
                        [4] Tim Lyon, Nested Sequents for Intermediate Logics: The Case of Gödel-Dummett Logics, Journal of Logic and Computation, vol. 33 (2023), no. 2, pp. 121–164.
