    - time: "11:40"
      type: "parallel"
      title: "Contributed talks (4)"
      id: "contributed-talks-4"
      tracks:
        - name: "Provability Logic"
          room: "Lecture Room 003"
          talks:
            - time: "11:40"
              title: "Towards infinitary GL"
              speaker: "Giovanni Soldà"
              id: "giovanni-solda"
              abstract: |
                        In this talk, we introduce an infinitary version of the modal logic $\mathtt{GL}$ that arises when allowing infintary conjunctions and disjunctions of formulas. We will then focus on showing that (extensions of) the logic introduced above can arise as provability logics. This will be done as follows: fixing an admissible class $A$, we consider a theory $T$ extending an infinitary version of $\mathtt{KP}$ plus a large chunk of the atomic diagram of $A$ (much in the spirit of what is done in [1]), and show that the provability predicate $Pr_T$ satisfies Gödel’s diagonal lemma and the Hilbert-Bernays provability conditions.

                        This is joint work with Mojtaba Mojtahedi and Fedor Pakhomov.

                        [1] Jon Barwise, Admissible sets and structures, Perspectives in Mathematical Logic, Springer-Verlag, 1975.
            - time: "12:00"
              title: "On the Goldblatt-Thomason theorem for interpretability logic"
              speaker: "Felix Frigola Gonzalez"
            - time: "12:20"
              title: "The logic behind Hanabi"
              speaker: "Elise Perrotin"
              id: "elise-perrotin"
              abstract: |
                        In the card game Hanabi, players must cooperate to play cards in a certain order without seeing their own cards, sharing information through restricted means of communication. This requires epistemic reasoning: players must think about what other players know, don’t know, and need to know in order to ensure success. Hanabi has received attention from the learning community as a benchmark to test agents’ theory of mind capabilities, but has not been much studied from a symbolic perspective, as formalizing Hanabi in Dynamic Epistemic Logic (DEL), the standard framework for reasoning about knowledge, is at the same time conceptually simple and too heavy for practical use.

                        The lightweight Epistemic Logic of Observation (EL-O) offers an promising alternative to DEL in which to formalize Hanabi. In particular, states in EL-O are sets of atomic epistemic formulas rather than Kripke models. However, EL-O is not quite rich enough for Hanabi: in particular, it does not handle common knowledge for groups of agents that aren’t the coalition of all agents. In this talk I will present my (both published and ongoing) work on enriching EL-O for Hanabi, from determining which standard logic the enriched logic should even be a fragment of, to defining a Hilbert-style axiomatization for this fragment, to then investigating a proof system which allows us to say something about semantics, using it to determine a class of states which includes reachable states in Hanabi and a corresponding class of actions, and finally exploring a number of interesting properties of knowledge in a game of Hanabi. Using these properties, we can then define a lightweight epistemic logic specifically suited for Hanabi, in which states are finite and the satisfiability problem is NP-complete

        - name: "Type Theory"
          room: "Board Room (401)"
          talks:
            - time: "11:40"
              title: "Generalized decidability via Brouwer ordinals"
              speaker: "Aref Mohammadzadeh"
            - time: "12:00"
              title: "Towards a Curry-Howard correspondence for existential graphs"
              speaker: "Pablo Donato"
              id: "pablo-donato"
              abstract: |
                        In this talk, I will introduce “scroll nets”, a novel diagrammatic formalism for representing proofs and programs. As the name indicates, it is based on the “scroll”, a topological notation for logical implication invented by Charles S. Peirce at the end of the 19th century for his system of existential graphs (EGs) [3]. In order to obtain a proper notion of static proof object from the inference rules of EGs, we add on top of the scroll a graphical syntax inspired by proof nets [1], which also acts as a form of term annotation in the style of type theory.

                        I will first motivate the notation from a philosophical standpoint, arguing that it captures the smallest motions of deductive reasoning in a very natural way, abstaining from any symbolic means of representation. I will then show how to express proofs in minimal implicative logic by simulating the rules of natural deduction. Through the Curry-Howard correspondence, this will lead us to identify a notion of detour that generalizes that of the simply-typed λ-calculus, making scroll nets into an expressive computational framework. If time remains, I will illustrate how to capture: 1. classical logic and intuitionistic disjunction by considering a horizontal generalization of the scroll first proposed by Oostra [2]; 2. intuitionistic subtraction [4] through a further vertical generalization of my own.

                        [1] Jean-Yves Girard, Linear logic Theoretical Computer Science vol. 50 (1987), no. 1, pp. 1–101
                        [2] Arnold Oostra, Los gráficos Alfa de Peirce aplicados a la lógica intuicionista, Cuadernos de Sistemática Peirceana, 2010, no. 2, pp. 25–60.
                        [3] Charles Sanders Peirce, Prolegomena to an Apology for Pragmaticism, The Monist, vol. 16 (1906), no. 4, pp. 492–546.
                        [4] Cecylia Rauszer Semi-Boolean Algebras and Their Applications to Intuitionistic Logic with Dual Operations Fundamenta Mathematicae vol. 83 (1974), pp. 219–249
            - time: "12:20"
              title: "Certified assurance for railway interlockings: from SAT proofs to mechanised verification in Rocq and Agda"
              speaker: "Harry Bryant"
              id: "harry-bryant"
              abstract: |
                        Safety-critical railway interlockings demand the highest levels of assurance, making formally verified proof checking essential. We present an approach for certifying Z3-generated SAT proof logs of unsatisfiability using Rocq and Agda, focusing on correctness guarantees and extracting a verified proof checker. In Rocq, we implement a checker for RUP proofs of CNF unsatisfiability, including Tseitin transformation steps, reduced Tseitin steps, and deletion steps to improve efficiency. We also developed an Agda prototype formalising Tseitin transformations and RUP inferences to reconstruct Z3 proof-logs. Correctness is established by proving inferences preserve logical entailment: any model of the assumptions satisfies all derived conclusions. Deriving falsity certifies the assumptions are unsatisfiable, enabling integration of Z3 proofs without modifying the proof assistants. Our Rocq framework offers an extensible methodology for certified proof checking: (1) implement the checking procedure, (2) prove soundness of each inference step, and (3) extract a verified OCaml checker. For scalability, we introduce proof-design patterns, including a tautology-based technique for validating Tseitin steps. While prior work, such as SMTCoq and CoqHammer, demonstrates how results from SMT solvers can be formally verified within interactive theorem provers, we extend this to Z3 and its recently introduced RUP format. However, the method- ology for creating correctness proofs is general and applicable to other SMT theories. Verification is crucial to railway interlockings, where ensuring logical soundness and safety are essential.

        - name: "Philosophy of Mathematics/Finitism"
          room: "Robert Recorde (102)"
          talks:
            - time: "11:40"
              title: "Against the equivalence of potentialist and actualist set theories"
              speaker: "Alessandro Giglia"
            - time: "12:00"
              title: "Formalizing indefinite extensibility"
              speaker: "Matthias Eberl"
            - time: "12:20"
              title: "Modal alternative set theory"
              speaker: "Aleksi Honkasalo"
              id: "aleksi-honkasalo"
              abstract: |
                        Petr Vopěnka’s Alternative Set Theory (AST) was proposed as an alternative account of infinity [2]. The axioms of AST include both sets and classes and it is a conservative extension of finite ZF [1]. Sets in AST are all finite in the Cantorian sense, but AST treats some of sets as “naturally infinite”. These sets contain subclasses which are not sets. These subclasses are called proper semisets. Proper classes are infinite both in the Cantorian sense as well from the AST’s viewpoint, but Vopěnka contends that they are merely potentially infinite.

                        However, the motivations behind AST has not been widely understood or accepted. This presentation is a work-in-progress report of an investigation into the question of if AST’s treatment of infinity can be clarified by using modal logic. The leading idea of the modal treatment of the axioms of is to start with a universe sets and claim that this universe can be extended to a universe which contains proper classes. To make room for proper semisets extensions may also contain non-standard elements as sets. The modal treatment of the axioms will also allow for comparison between the treatment of potential infinity in AST and potentialist set theories as well as hopefully gain more insight into the notion of natural infinity.

                        [1] Antonı́n Sochor, Metamathematics of the alternative set theory III, Commentationes Mathematicae Universitatis Carolinae, vol. 24 (1983), no. 1, pp. 137–154.
                        [2] Petr Vopěnka, Mathematics in the Alternative Set Theory, B.G. Teubner Verlagsegellschaft, 1979.

        - name: "Proof Mining"
          room: "Lecture Room 002"
          talks:
            - time: "11:40"
              title: "On the structure of convergence proofs in stochastic optimization"
              speaker: "Thomas Powell"
              id: "thomas-powell"
              abstract: |
                        The last two years have seen a rapid advance of proof theory being applied in probability and related fields. This broad project includes many case studies in stochastic optimization: Here proof-theoretic insights have led to both new algorithms and new convergence results, where the latter typically come equipped with quantitative information. A byproduct of these efforts has been a deeper understanding of the broad organisational structure of convergence proofs in optimization, many of which hinge on minor variations of a small number of powerful gambits. I will discuss ongoing work (joint with Alex Wan and Benjamin Langton) to devise new, high-level, and domain-specific logical systems that capture these proof techniques, designed for applications in automated reasoning, including the synthesis of efficient and readable convergence rates, and the automated lifting of nonstochastic proofs to the stochastic setting.
            - time: "12:00"
              title: "A finitistic perspective on convergence results"
              speaker: "Pedro Pinto"
              id: "pedro-pinto"
              abstract: |
                        In this talk, I discuss recent work [3] in proof mining concerning the convergence of a generalized viscosity implicit rule in Hadamard spaces, approached from a finitistic perspective. Proof mining [2] employs proof-theoretical techniques to analyse prima facie noneffective mathematical proofs with the goal of extracting additional informa- tion. Such new information is usually in the form of effective and highly uniform rates or bounds. In the last thirty years, this area of proof theory has been greatly developed by Ulrich Kohlenbach and his collaborators, and proof mining techniques have been particularly successful in applications to nonlinear analysis and adjacent areas. A key feature of proof mining is its ability to unravel complex mathematical arguments, often enabling the replacement of general assumptions by the specific instances actually used in a proof. This has proven particularly fruitful in the lifting of results from linear to nonlinear settings, where many combinatorial aspects of the original arguments can still be exploited. There are, however, limitations and the absence of linear structure often obstructs a direct generalization of such results. In this regard, a finitistic (i.e. quantitative) perspective has proved to be a useful approach for obtaining new results in settings where standard techniques fail, for example in [1, 4].

                        [1] Bruno Dinis and Pedro Pinto, Strong convergence for the alternating Halpern-Mann iteration in CAT(0) spaces, SIAM Journal on Optimization, vol. 33 (2023), no. 2, pp. 785–815.
                        [2] Ulrich Kohlenbach, Applied proof theory: proof interpretations and their use in mathematics, Springer Monographs in Mathematics, Springer-Verlag, Berlin, 2008.
                        [3] Pedro Pinto, A finitistic approach to a generalized viscosity implicit rule in Hadamard spaces, in preparation.
                        [4] Pedro Pinto and Nicholas Pischke, On the Halpern method with adaptive anchoring parameters, Mathematics of Computation, to appear.
            - time: "12:20"
              title: "Effective methods: logic and optimization"
