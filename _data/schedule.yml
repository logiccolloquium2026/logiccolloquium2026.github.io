                        The Herbrand theorem is a way to prove first order logically valid sentences \phi that are in the prenex form. The proof is a certain disjunction of term instances of the matrix of \phi, which is a propositional tautology. The structure of terms occurring in the disjunction may be very complex. We have studied the complexity of this structure using the Student-Teacher game. In this game Student proposes terms and Teacher proposes counterexamples. (If considered in pure predicate logic and viewed syntactically, Teacher just plays distinct free variables.) The game is defined using a finite tree in which nodes are plays of Teacher and edges are plays of Student. Furthermore, there is a linear order on the nodes, which determines how the game is played. One of our results says that for any such ordered tree T, a logically valid sentence can be constructed such that T is a substructure of any Herbrand proof.

                        This is a joint work with Sam Buss.

            - time: "16:25"
              title: "Automatic structures and the problem of natural well-orderings"
              speaker: "Lev Beklemishev"
              id: "beklemishev-proof-theory"
              abstract: |
                        We explore the idea of using automatic and other very efficient presentations of structures to deal with the conceptual problem of natural proof-theoretic ordinal notations. We conclude that this approach still does not meet the goals. Joint work with Fedor N. Pakhomov.# Paste verbatim text block 1 here.

