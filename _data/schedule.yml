              time: "12:00"
              id: "charles-walzer"
              abstract: |
                        This work develops a labelled sequent calculus for logics based on truthmaker semantics, a model-theoretic framework in which the notion of exact truthmaking is primitive. An exact truthmaker for $\varphi$ is a state that necessitates and is wholly relevant to $\varphi$’s truth. Different kinds of truthmaking and entailment relations are defined in terms of exact truthmaking and certain closure conditions on models [1]. A core feature of truthmaker semantics is that it provides a framework for constructing hyperintensional logics, i.e., logics that allow for contexts that do not respect classical logical equivalence. Labelled sequent calculi provide a powerful extension of Gentzen-style proof systems in which model-theoretic notions can be represented in a uniform and modular way, while preserving important structural properties from proof theory, such as the syntactic admissibility of cut. Our proof system subsumes previous approaches from Fine and Jago [2] and Korbmacher [4], providing calculi for logics based on non-inclusive, inclusive, and replete classes of exact truthmaker models. The labelling mechanism also allows the calculus to uniformly represent the derivative notions of inexact, loose, and exemplification truthmaking. Different label distributions also allow for the definition of different kinds of entailment relations for each kind of truthmaking, with a proof of soundness and completeness uniformly covering all such cases. Finally, we provide modal companions for each of the above-mentioned variants of truthmaking. This is accomplished by defining a suitable labelled calculus for modal information logics, extending previous results from van Benthem [5] and Knudstorp [3].

                        [1] K. Fine, Truthmaker semantics, A Companion to the Philosophy of Language (Bob Hale, Crispin Wright, and Alexander Miller, editors), Wiley, Oxford, 2017, pp. 556–577.
                        [2] K. Fine and M. Jago, Logic for exact entailment, The Review of Symbolic Logic, vol. 12 (2019), no. 3, pp. 536–556.
                        [3] S.B. Knudstorp, Logics of truthmaker semantics: Comparison, compactness and decidability, Synthese, vol. 202 (2023), no. 6, pp. 206.
                        [4] J. Korbmacher, Proof systems for exact entailment, The Review of Symbolic Logic, vol. 16 (2022), no. 4, pp. 1260–1295.
                        [5] J. van Benthem, Implicit and explicit stances in logic, Journal of Philosophical Logic, vol. 48 (2019), no. 3, pp. 571–601.
            - title: "A truthmaker semantics for positive free logic"
              speaker: "Ragna Oeynhausen"
              time: "12:20"
              id: "ragna-oeynhausen"
              abstract: |
                        This paper attempts to develop an exact truthmaker semantics for positive free logic. On this account, a truthmaker for a proposition is a state (a possible fact) that makes the proposition true. While, classically, an atomic statement is true iff the object denoted by the individual term falls under the given predicate, the current proposal analyses truth with reference to verifying facts. Consequently, the truthmaker approach is particularly suited to handle statements containing empty singular terms, i.e. singular terms that do not denote an object in the domain. Logics that admit empty-termed statements are called free; if empty-termed statements may be true, the logic is a positive free logic.

                        This paper adopts the exact truthmaker semantics developed in [1] and extends the proposal for first-order sentences, quantifiers, identity, and possibly empty singular terms. After providing the generalised semantical rules, a soundness and completeness result will be established. Along the way, it will be shown that the current proposal provides an exactification of the well-known dual-domain semantics for positive free logics (see [2] for a modern presentation). Translations between the two models will be provided. Finally, it is argued that the truthmaker account is preferable on philosophical grounds.

                        [1] Kit Fine, Truthmaker Semantics, A Companion to the Philosophy of Language (Bob Hale et al., editors), Wiley Blackwell, Chichester, West Sussex, UK, 2017, pp. 556–577.
                        [2] Edgar Morscher and Peter Simons, Free Logic: A Fifty-Year Past and an Open Future, New Essays in Free Logic (Edgar Morscher and Alexander Hieke, editors), Springer, Dordrecht, 2001, pp. 1–34.
