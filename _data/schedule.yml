    - time: "11:40"
      title: "Contributed talks (1)"
      id: "contributed-talks-1"
      type: "parallel"
      tracks:
        - name: "Computability, Structure Theory"
          room: "Lecture Room 003"
          talks:
            - title: "Computable elements within tree-presented structures"
              speaker: "Russell Miller"
              id: "russel-miller"
              time: "11:40"
              abstract: |
                        Continuum-sized structures are often presentable as the set of paths through a computable subtree of \(ω^{<ω}\) , with the functions in the signature computed by Turing functionals on those paths. Such structures include the rings \(\mathbb{Z}_p\) of \(p\)-adic integers, related groups such as \(\hat{\mathbb{Z}}^+\) and \(\hat{\mathbb{Z}}^{\times}\), the group Sym(\(\omega\)) of all permutations of \(\omega\), and all automorphism groups of computable structures. If quotients by \(\prod^0_1\) equivalence relations are allowed, then the fields \(\mathbb{R}\) and \(\mathbb{C}\) are also included. These tree-computable presentations are formally defined in [1].

                         Within such a structure, the computable paths form a countable substructure. In the case of the field \(\mathbb{R}\), Korovina and Kudinov showed in [2] that the Turing degree spectrum of this substructure consists of precisely the high degrees (i.e., those \(\boldsymbol{d}\) with \(\boldsymbol{d'}\ \ge 0''\)). In contrast, Morozov proved in [3] that the computable permutations ofω form a group whose degree spectrum is the upper cone above \(\boldsymbol{0''}\). We offer some further results here, showing, for instance, that the spectrum of the group \(\text{Gal}_0(\mathbb{Q})\) of computable automorphisms of the algebraically closed field \(\overline{\mathbb{Q}}\) is contained in the upper cone above \(\mathbb{0'}\).
                         
                         [1] J. Block and R. Miller, Computability for tree presentations of continuumsize structures, submitted for publication.
                         [2] M. Korovina and O. Kudinov, Spectrum of the computable real numbers, Algebra and Logic, vol. 55 (2017), no. 6, pp. 485–500.
                         [3] A.S. Morozov, Permutations and implicit definability, Algebra and Logic, vol. 27 (1988), no. 1, pp. 12–24.

            - title: "Well-ordering principles over recursive comprehension"
              speaker: "Gabriele Buriola"
              id: "gabriele-buriola"
              time: "12:00"
            - title: "Better-quasi-ordering sequences with the gap condition"
              speaker: "Davide Manca"
              id: "davide-manca"
              time: "12:20"
              abstract: |
                        Being a well-quasi-order is a fundamental combinatorial property with important applications to logic and computer science. A classic result by Higman states that finite sequences with elements in a well-quasi-order form a well-quasi-order with respect to the relation induced by Higman embeddings [2]. Gordeev proved [1] that, for sequences with elements in a well-order, the theorem holds even under an additional requirement: a symmetrical version of the gap condition originally formulated by Friedman for labelled trees (see [4]). Under that condition, the consistency strength of the theorem increases considerably.

                        We prove that Gordeev’s relation of symmetrical gap-embeddability satisfies the stronger property of being a better-quasi-order, a natural strengthening of well-quasiorders introduced by Nash-Williams. In particular, our proof relies on a restricted form of Nash-Williams’ better-quasi-ordering theorem for trees [3]. We also obtain an upper bound for the strength of our theorem in reverse mathematics, in terms of systems of partial impredicativity [5]. These results were obtained in collaboration with Patrick Uftring (University of the Bundeswehr Munich).

                        [1] Lev Gordeev, Generalizations of the one-dimensional version of the KruskalFriedman theorem, The Journal of Symbolic Logic, vol. 54 (1989), no. 1, pp. 100– 121.
                        [2] Graham Higman, Ordering by divisibility in abstract algebras, Proceedings of the London Mathematical Society, vol. s3-2 (1952), no. 1, pp. 326–336.
                        [3] C.St.J.A. Nash-Williams, On well-quasi-ordering infinite trees, Mathematical Proceedings of the Cambridge Philosophical Society, vol. 61 (1965), no. 3, pp. 697–720.
                        [4] Stephen G. Simpson, Nonprovability of Certain Combinatorial Properties of Finite Trees, in: Harvey Friedman’s Research on the Foundations of Mathematics (L.A. Harrington and M.D. Morley and A. Sˆcˆedrov and S.G. Simpson, editors), Vol. 117. Studies in Logic and the Foundations of Mathematics, Elsevier, NorthHolland, Amsterdam, 1985, pp. 87–117.
                        [5] Henry Towsner, Partial impredicativity in reverse mathematics, The Journal of Symbolic Logic, vol. 78 (2013), no. 2, pp. 459–488.
        - name: "Model Theory"
          room: "Board Room (401)"
          talks:
            - title: "Connected components of sets definable in d-minimal expansion of the real field"
              speaker: "Masato Fujita"
              id: "masato-fujita"
              time: "11:40"
            - title: "Universal equivalence of linear groups over rings"
              speaker: "Galina Kaleeva"
              id: "galina-kaleeva"
              time: "12:00"
            - title: "On generalisations of a representation of the integers modulo p, for the purpose of occasionally establishing the unsolvability of diophantine inequalities"
              speaker: "André Rognes"
              id: "andre-rognes"
              time: "12:20"
              abstract: |
                        It is well known that if a diophantine equation turns out not to have a solution over the integers modulo \(p\), for some natural number \(p\), then it does not have a solution over the standard integers. This is because the integers modulo \(p\) are a homomorphic image of the integers. In contrast, the integers modulo \(p\) are of little use when faced with diophantine inequalities, as the homomorphic image of the less-than-relation is trivial. The purpose of the present work is to introduce a way of generalising a particular representation of the integers modulo \(p\). The resulting generalisations, believed to be novel, are in the form of decidable Lindenbaum algebras, which we think of as approximations to the Lindenbaum algebra of the first-order theory of integer arithmetic. Crucially if a system of diophantine inequalities turns out not to be solvable in any of the approximations, then it is not solvable over the standard integers. I believe that decision procedures based on the approximations could be implemented and run on personal computers in order to to study diophantine inequalities much as one has studied diophantine equations by interpreting them over the integers modulo \(p\), see e.g. the introductory chapters of the classic book by L. J. Mordell [1].

                         [1] Louis Mordell, Diophantine equations, Academic press, 1969.
