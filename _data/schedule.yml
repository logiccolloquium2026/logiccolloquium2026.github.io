                Kechris, Nies and Tent proposed a program to study the isomorphism relation of Borel classes of non-Archimedean Polish groups and to determine their exact complexity in the Borel reducibility hierarchy. In this talk I will give a survey of the known results in this program, including some recent work on extremely amenable groups and procoutable groups. This involves joint work with Wei Dai, Mahmood Etedadialiabadi, Feng Li, Ruiwen Li, Andre Nies, Gianluca Paolini, and Víctor Hugo Yáñez.
