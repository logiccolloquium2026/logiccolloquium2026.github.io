            - title: "Generalized Sums of Linear Orders"
              speaker: "Alvaro Diaz Ramos"
              time: "11:40"
              id: "alvaro-diaz-ramos"
              abstract: |
                        Generalizing the arithmetic operations on the ordinals and cardinals, in the early 20th century, Hausdorff, followed by Whitehead and Russell, put forth the basic operations of addition and multiplication of linear orders. These were later studied in more general settings by Tarski and Birkhoff. What’s surprising about this early period is that none of these authors ever attempted to justify their focus on these operations, beyond invoking the previous success of their study on ordinals. In fact, there has never been a formal justification given for this choice of operations.

                        In this talk, I will discuss our attempt to justify the naturality of the sum of linear orders by appealing to the categorical notion of sum provided by the coproduct. As it turns out, the category of linear orders in general lacks coproducts, so we develop a general theory of sums of linear orders, which are natural extensions of the coproduct in this setting. I will isolate algebraic and order-theoretic properties satisfied by the traditional sum of linear orders, and identify different sums exhibiting them. The most prominent and well-behaved of these are the simple sums, which emerge from sum-generating classes: classes of orders with a very rich algebraic structure. Most of the properties of the simple sums will in fact not hold in general, as I will show by introducing the method of complicated classes, a general approach to constructing unstructured sums.

                        Finally, I will discuss commutative sums of well-orders, which offer new proofs to many of the ordinals’ order-theoretic properties — in particular, giving strict bounds on the possible sums of two ordinals. I will also discuss a recent extension of sums to other categories, including those of groups and modules.
