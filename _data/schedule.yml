    - time: "15:45"
      title: "Special Sessions"
      type: "special"
      id: "history-of-logic-computability"
      tracks:
        - name: "History of Logic and Computing"
          room: "Robert Recorde (102)"
          organisers: "Troy Astarte (Swansea)"
          talks:
            - title: "On verifying computational systems"
              speaker: "Giuseppe Primiero"
              id: "giuseppe-primiero"
              time: "15:45"
              abstract: |
                        The history of formal verification traces an evolving understanding of computational correctness. Early approaches treated programs as abstract and fully specified artefacts, defining correctness as input–output conformity grounded in mathematical proof. With concurrency and large-scale systems, verification expanded to address non-determinism, introducing temporal and probabilistic notions of correctness. In the era of machine learning and AI, systems are opaque, adaptive, and embedded in sociotechnical contexts: correctness now extends beyond functional behaviour to non- functional properties such as trustworthiness, fairness, transparency, and responsibility. We overview this trajectory to show that the central question of formal verification is no longer only whether a system computes correctly, but whether its behaviour can be formally shown to be trustworthy and responsibly governed.
            - title: "Anatomy of a Programming Language: Prolog and the Beginnings of European Artificial Intelligence Research"
              speaker: "Mathilde Fichen"
              id: "mathilde-fichen"
              time: "16:25"
              abstract: |
                        The programming language Prolog, developed in the early 1970s by research teams in Marseille and Edinburgh, highlights the difficulty of grasping the epistemological nature of the complex object that a programming language represents. Whereas most pre-existing programming languages belong to a common genealogy - a language being created either as a continuation of, or in reaction to, a pre-existing language deemed insufficient - thereby granting these objects membership within the same technical family, Prolog was not initially designed as a programming language. The language emerged through successive iterations from an automated theorem-proving tool used within a natural language processing project. This gradual emergence also makes it difficult to pinpoint the exact moment when Prolog “became” a programming language and ceased to be merely a proving tool. Prolog’s particular genealogy calls into question, from within, the boundaries defining membership in the category of technical objects. By studying the social, scientific, and cultural context in which Prolog first appeared and subsequently developed - namely, the emerging field of artificial intelligence research in Europe during the 1970s and 1980s - we seek to better characterize the nature of this complex object by observing the concrete manifestations of the language’s existence. Particular attention will be paid to the performative power of the language, which helped disseminate the mechanisms of automated deduction that were then predominant in AI research during those decades.
            - title: "Writing the history of Logic and Computing"
              speaker: "John Tucker"
              id: "john-tucker"
              time: "17:05"
              abstract: |
                        What has mathematical and philosophical logic done for the development of computing? Surely a great deal?  Isn’t logic a foundation of all computing? I will explore historically these broad questions with software development in mind, especially programming language design, specifying and reasoning about programs and systems, and processing natural languages. What are insights that might stand the ruthless tests of technological fashion, cultural memory and economics of education?
            
        - name: "Computability in Analysis"
          room: "Lecture Room 002"
          organisers: "Daniel Graça (Faro) and Arno Pauly (Swansea)"
          talks:
            - title: "Complexity in computable analysis: the notions of costs for analogue models"
              speaker: "Manon Blanc"
              id: "manon-blanc"
              time: "15:45"
              abstract: |
                        In computer science, discrete, or digital, structures have been widely studied. It comes from highly discrete settings of today’s computers: they represent and compute over finite quantities. Their physical components are constrained to operate in a binary true/false regime. Thus, the mathematical models of computation that we use to describe them, such as Turing machines, are discrete: they operate with integers and/or words on a finite alphabet, step by step, that is, in discrete time. However, the world around us is continuous and can be described by ordinary differential equations (ODEs), like in physics and other applied sciences, such as biology. For example, the computers we currently use are made up of analogue electronic components, which are naturally defined, in physics, by certain ODEs over continuous settings. We also have mathematical models for analogue machines and analogue computers, such as the ”General Purpose Analog Computer” proposed by Claude Shannon in the 1940s ([5]). These models can be seen as the analogue equivalent of Turing machines.

                        Now, we have quite good characterisations of the notions of cost, or complexity, in discrete models, which are all equivalent up to some polynomial thanks to the Church-Turing thesis. We are interested in having good characterisations of complexity for analogue and continuous models. Also, we study the computing power of such models: understanding whether we could compute more and faster with them. We present here some existing results ([1, 2, 3, 4]) regarding (ODE-based) characterisations of time and space for continuous problems in the model of computable analysis.

                        [1] Manon Blanc, Discrete-Time and Continuous-Time Systems over the Reals: Relating Complexity with Robustness, Length and Precision, Institut Polytechnique de Paris, PhD Thesis, 2025.
                        [2] Olivier Bournez and Amaury Pouly, A survey on analog models of computation, Handbook of Computability and Complexity in Analysis, Theory and Applications of Computability, Springer, 2021.
                        [3] Riccardo Gozzi, Analog characterization of complexity classes, Universidade de Lisboa Instituto Superior Tecnico, PhD Thesis, 2022.
                        [4] Amaury Pouly, Continuous models of computation: from computability to complexity, Institut Polytechnique de Paris, PhD Thesis 2015.
                        [5] Claude E. Shannon, Mathematical Theory of the Differential Analyser,Journal of Mathematics and Physics MIT, vol. 20 (1941), pp. 337–354.
            - title: "Extracting certified programs from type-theoretic proofs in analysis and topology"
              speaker: "Holger Thies"
              id: "holger-thies"
              time: "16:25"
              abstract: |
                        Recent developments in proof assistants based on dependent type theory have made it possible to formalize substantial parts of analysis and topology while preserving computational content. In this talk, we discuss approaches to extracting certified programs from formal proofs in constructive type theory, with a focus on computable analysis and exact real computation. Topics include efficient representations for exact real computation, operations on hyperspaces and subsets, and solution operators for ordinary differential equations.

                        Parts of the talk are based on joint work with Michal Konecný and Sewon Park.
            - title: "Computable subcontinua and effective decomposability of arcs and arc-like continua"
              speaker: "Matea Čelar"
              id: "matea-celar"
              time: "17:05"
              abstract: |
                        A continuum (compact and connected metric space) is said to be decomposable if it can be written as a union of two proper subcontinua. Although it may seem that all nontrivial continua are decomposable, indecomposable continua naturally arise in various contexts in dynamical systems [1]. In computable topology, decomposability arises as a condition in the investigation of computable subcontinua of semicomputable chaniable continua [3].

                        We aim to investigate which computable metric continuua are expressible as a union of two computable proper subcontinua. We will call such continua effectively decomposable. A decomposable continuum can alternatively be characterised as a continuum which contains a proper subcontinuum with non-empty interior [4]. Therefore, determining whether a given continuum is effectively decomposable is closely related to identifying its computable proper subcontinua.

                        In this talk, we will examine effectively compact continua which contain (a homeomorphic copy of) R as an open subset and, more generally, (topologically) decomposable chainable (arc-like) continua. We will show how to construct computable proper subcontinua of such continua and how this implies that such continua are effectively decomposable.

                        This talk contains joint work with V. Čačić, M. Horvat, Z. Iljazović, M. Jelić and D. Tarandek.

                        [1] M. Barge and R.M. Gilette, Indecomposability and dynamics of invariant plane separating continua, Contemporary Mathematics, vol. 117 (1991), pp. 13–38.
                        [2] V. Čačić, M. Čelar, M. Horvat, and Z. Iljazović, Computable approximations of semicomputable graphs, Logical Methods in Computer Science, vol. 22 (2026).
                        [3] Z. Iljazović and B. Pažek, Computable intersection points, Computability, vol. 7 (2018), pp. 57–99.
                        [4] A. Illanes, Continuum Theory, Universitext, Springer Cham, 2025.
          

- id: "tuesday"
  name: "Tuesday, June 30"
  blocks:
    - time: "09:15"
      type: "plenary"
      room: "Lecture Room 002"
      title: "Conceptual change in set theory - between continuity and revolution"
      speaker: "Carolin Antos-Kuby"
      id: "carolin-antos-kuby"
      abstract: |
                The general question of whether revolutions are possible in mathematics remains contested. Prominently, Crowe (1975, 165) claims that revolutions cannot occur in mathematics as revolutions require that “a previously accepted entity within mathematics proper be rejected.” In Kuhn’s account, such discontinuities are a significant feature of scientific revolutions. If one wants to argue against Crowe that change in mathematics is comparable to change in the (natural) sciences, one can either show that discontinuities do indeed exists in mathematical change (see Kitcher (1984)), or that change in the natural sciences is not as discontinuous as Kuhn claims it to be (see Post (1971)).

                In this talk, I will use these possible answers to study a change that took place in the 1960’s within the field of set theory. Here, the introduction and development of model-theoretic methods, such as ultrapower constructions, inner models and forcing, sparked an explosion of results, clarified long-standing questions and opened up new areas of research. Most importantly, these methods provided a unified methodology for set theory’s two main epistemic functions: serving as a foundational theory on the one hand, and studying mathematical infinity on the other.

                This model-based turn in set theory exhibits several markers of revolutionary theory change: It addressed not only a lack of progress in some areas of set theory, but it resolved a fundamental flaw of set theory at that time, namely the lack of a unified methodological basis. This new basis led to an abandonment of earlier methods and explanatory patterns, as well as changing the general understanding of fundamental concepts and research questions. Are these markers sufficient to call the change in set theory a revolution?

                [1] Michael J. Crowe, Ten “laws” concerning patterns of change in the history of mathematics, Historia Mathematica, vol. 2 (1975), no. 2, pp. 161–166.
                [2] Philip Kitcher, The Nature of Mathematical Knowledge, Oxford University Press, 1984.
                [3] Heinz R. Post, Correspondence, Invariance and Heuristics: In Praise of Conservative Induction, Studies in History and Philosophy of Science Part A, vol. 2 (1971), no. 3.
    - time: "10:15"
