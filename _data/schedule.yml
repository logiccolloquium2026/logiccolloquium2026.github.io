          talks:
            - title: "Computable structure theory and forcing"
              speaker: "Rusell Miller"
              id: "russel-miller"
              time: "11:40"
              abstract: |
                        Continuum-sized structures are often presentable as the set of paths through a computable subtree of \(ω^{<ω}\) , with the functions in the signature computed by Turing functionals on those paths. Such structures include the rings \(\mathbb{Z}_p\) of \(p\)-adic integers, related groups such as \(\mathbb{Z}^+\) and \(\mathbb{Z}^{\times}\), the group Sym(\(\omega\)) of all permutations of \(\omega\), and all automorphism groups of computable structures. If quotients by \(\prod^0_1\) equivalence relations are allowed, then the fields \(\mathbb{R}\) and \(\mathbb{C}\) are also included. These tree-computable presentations are formally defined in [1].

                         Within such a structure, the computable paths form a countable substructure. In the case of the field \(\mathbb{R}\), Korovina and Kudinov showed in [2] that the Turing degree spectrum of this substructure consists of precisely the high degrees (i.e., those \(\boldsymbol{d}\) with \(\boldsymbol{d'}\ \ge 0''\)). In contrast, Morozov proved in [3] that the computable permutations ofω form a group whose degree spectrum is the upper cone above \(\boldsymbol{0''}\). We offer some further results here, showing, for instance, that the spectrum of the group \(\text{Gal}_0(\mathbb{Q})\) of computable automorphisms of the algebraically closed field \(\overline{\mathbb{Q}}\) is contained in the upper cone above \(\mathbb{0'}\).
                         
                         [1] J. Block and R. Miller, Computability for tree presentations of continuumsize structures, submitted for publication.
                         [2] M. Korovina and O. Kudinov, Spectrum of the computable real numbers, Algebra and Logic, vol. 55 (2017), no. 6, pp. 485–500.
                         [3] A.S. Morozov, Permutations and implicit definability, Algebra and Logic, vol. 27 (1988), no. 1, pp. 12–24.

