      tracks:
        - name: "Computability"
          room: "Lecture Room 003"
          talks:
            - time: "15:45"
              title: "On decidability and bounded proofs in fragments of computability logic"
              speaker: "Stella Spadoni"
              id: "spadoni-computability"
              abstract: |
                        Computability logic (CoL) reinterprets logic as a formal theory of dynamic interaction, modelling statements as computational games between pre-defined agents $\mathcal{M}$ and $\mathcal{E}$ [3]. The present work tackles two open problems regarding CoL fragments CL15 [4] and CL5 [2].

                        Firstly, we prove CL15 decidable [5]: the potentially infinite search space from resource contraction can be pruned while preserving completeness, bounding contraction applications through a function of the cirquent’s complexity. Secondly, we develop a novel and purely syntactic proof that any derivable cirquent in the duplication-free version of CL5 admits a polynomial-size derivation [1], bounded by three structural limits (width, branch length and node size) in the bottom-up proof construction.

                        [1] Matthew Steven Bauer, The Computational Complexity of Propositional Cirquent Calculus, Logical Methods in Computer Science, vol. 11 (2015), no. 1, Art. 12.
                        [2] Giorgi Japaridze, Introduction to Cirquent Calculus and Abstract Resource Semantics, Journal of Logic and Computation, vol. 16 (2006), no. 4, pp. 489–532.
                        [3] In the beginning was game semantics , Games: Unifying Logic, Language and Philosophy, (Ondrej Majer and Ahti-Veikko Pietarinen and Tero Tulenheimo, editors), Logic, Epistemology, and the Unity of Science, vol. 15, Springer, 2009, pp. 249–350.
                        [4] The taming of recurrences in computability logic through cirquent calculus, Part I, Archive for Mathematical Logic, vol. 52 (2013), no. 2, pp. 173–212.
                        [5] Stella Spadoni, The Fertile Steppe: Computability Logic and the decidability of one of its fragments, arXiv:2503.05826v1(2025).
            - time: "16:05"
              title: "On protocol security via computability logic"
              speaker: "Cosimo Perini Brogi"
              id: "brogi-computability"
              abstract: |
                        Experience in cybersecurity shows that communication protocol design is exceptionally error-prone: security weaknesses often arise less from defects in cryptographic primitives than from flawed protocols, owing to the incorrect logical interplay among agents and potential adversaries in a network. Empirical evidence likewise suggests that ‘verification is only as sound as the language we used for it’ [1].

                        We propose computability logic (CoL) [2] as a formal foundation for modelling, analysing and verifying secure communication protocols by treating specifications as interactive games between computational agents.

                        We argue that CoL naturally captures protocol dynamics and formally identifies structural invariants that underlie classes of vulnerabilities and attacks. Moreover, its constructive character favours automated strategy extraction and synthesis of correctby-construction executable artefacts from verification proofs while preserving the gametheoretic, interactive nature of protocols.

                        We consider a CL4-based case study we presented at ITASEC 2026 to show the feasibility of our approach on representative protocol patterns, and outline theoretical and practical directions for extending the method to broader protocol families. This work in progress aims to advance logical verification methods for real-world secure communication.

                        [1] Ross J. Anderson, Security engineering – A guide to building dependable distributed systems (3rd ed.), Wiley, 2020.
                        [2] Giorgi Japaridze, Introduction to computability logic, Annals of Pure and Applied Logic, vol. 123 (2003), no. 1–3, pp. 1–99.
            - time: "16:25"
              title: "The tree interpretation and transfinite recursion"
              speaker: "Giorgio Genovesi"
              id: "giorgio-genovesi"
              abstract: |
                        The interpretation of ZFC without powerset in the theory of second order arithmetic can be divided into two steps. The first is a tree interpretation, sets are interpreted as well founded trees up to an appropriate equivalence relation needed to ensure extensionality. This gives a theory which satisfies Axiom Beta, that is, the statement that every well founded relation has a collapsing function. The second interpretation is the restriction to an initial segment of the constructible universe. These interpretations give a nice correspondence between subsystems of arithmetic and systems of set theory without the powerset axiom.

                        We go over some generalizations to this interpretation to systems of higher order arithmetic with restricted comprehension and theories of sets with bounded iterations of the powerset of ω. We also show that Axiom Beta implies the scheme of Elementary Transfinite Recursion as well as the totality of the primitive recursive set function. These results are part of a joint work with Emanuele Frittaion.

        - name: "Model Theory"
          room: "Board Room (401)"
          talks:
            - time: "15:45"
              title: "On algebras of binary formulas in circularly ordered structures: piecewise monotonic case"
              speaker: "Aizhan Altayeva"
              id: "altayeva-model"
            - time: "16:05"
              title: "Semantic determinacy and self-interpretations of theories"
              speaker: "Mirko Engler"
              id: "engler-model"
            - time: "16:25"
              title: "Localic Esakia duality"
              speaker: "Nesta van der Schaaf"
              id: "vanderschaaf-model"
              abstract: |
                        Classical Priestley duality for distributive lattices and Esakia duality for Heyting algebras use prime ideals to recover their spatial counterpart. This is non-constructive: it uses the Prime Ideal Theorem to recover the lattice. In this talk we outline a constructive Esakia duality.

                        A constructive Priestley duality was already proven by Townsend [2]. Distributive lattices are replaced by their point-free variant: coherent frames. Priestley spaces are replaced by ordered Stone locales: Stone locales equipped with closed localic partial orders satisfying a point-free Priestley separation axiom. Townsend proved they are dually equivalent.

                        As point-free ingredients for Esakia duality, we take on the algebra side the recently introduced Heyting frames [1]. On the other hand, observe that Esakia spaces are Priestley spaces whose source map is open. Thus define Esakia locales as ordered Stone locales with open source map.

                        Since localic relations are tricky to handle, we use a third, mediating notion. We prove that closed localic relations with open source map can be recovered by their localic down closure operator. Thus the partial order of an Esakia locale is captured entirely by a join-preserving map on the underlying frame. Axiomatising this structure gives Esakia frames.

                        The conclusion is an equivalence between Heyting frames and Esakia frames, and a dual equivalence between Esakia frames and Esakia locales. Combined, this factorises Townsend’s duality, and gives a fully constructive, localic analogue of Esakia duality.

                        [1] G. Bezhanishvili, L. Carai, and P. J. Morandi, A frame-theoretic perspective on Esakia duality, Algebra Universalis, vol. 84 (2023), no. 4, pp. 30.1–30.24.
                        [2] C. Townsend, Localic Priestley duality, Journal of Pure and Applied Algebra, vol. 116 (1997), no. 1, pp. 323–335.
        - name: "Philosophy of Mathematics/History"
          room: "Robert Recorde (102)"
          talks:
            - time: "15:45"
              title: "Dedekind's axiomatisation of arithmetic as a case of informal rigour"
              speaker: "Daniel Isaacson"
              id: "isaacson-philosophy"
            - time: "16:05"
              title: "Leibniz and Russell: on the birth of analytic philosophy"
              speaker: "Karol Wapniarski"
              id: "wapniarski-philosophy"
              abstract: |
                        Although Bertrand Russell’s interpretation of Leibniz philosophy is as well known as lasting are his contributions to Leibniz scholarship in the 20th century, the question to what extent reading Leibniz influenced development of Russell’s own philosophy has received well deserved scholarly attention only recently and remains understud- ied. While it is usually recognised that Leibniz did influenced Russell, the scholarly discourse rarely goes into intricacies of what this influence consisted in precisely anto what extent we should assume its presence and acknowledge its importance. The issue therefore remains obscure, especially when it comes to assessing Leibniz’s role in Russell’s transition from idealism to logicism.

                        What I propose is a re-examination of Leibniz’s influence on Russell through a study of the so far neglected but important in this regard Russell- Couturat Correspondence [1] (1897-1913), particularly a substantial discussion on Leibniz in the years 1900-1903. What it reveals is that Russell continued to engage with Leibnizian philosophy beyond the composition of his An Exposition of the Philosophy of Leibniz, up to the time of writing The Principles of Mathematics. It also shows that the beginnings of this engagement, in contrast to the usual account, were not random but carefully though out, and that Russell explicitly recognised himself as a successor of Leibniz’s logical endeavours. Through the study of this correspondence, I argue that Leibniz’s influence on Russell extends well beyond the documented impact and that reassessing this influence can help us better understand ambitions of the early analytic philosophy.

                        [1] Bertrand Russell, Correspondance sur la philosophie, la logique et la politique avec Louis Couturat (1897–1913), ed. by Anne-Françoise Schmid, 2 vols., Kimé, Paris, 2001.
            - time: "16:25"
              title: "An introduction to Husserl's phenomenology: on the nature of numbers"
              speaker: "Rezan Burcu Büyükikiz"
              id: "buyukikiz-philosophy"
              abstract: |
                        This talk examines the conceptual development of Edmund Husserl’s philosophy of mathematics, tracing the transition from his 1887 habilitation thesis, Über den Begriff der Zahl, to his 1907 lectures, The Idea of Phenomenology. We focus on the concept of “Colligation” (Kolligation) as a temporal-psychological act of the subject and its eventual transformation into the phenomenological concept of “givenness” (Gegebenheit). Drawing on Elisabeth Ströker’s transcendental analysis, we argue that Husserl’s early work on numbers provides a crucial grounding for pure logic and epistemology. Finally, we discuss how the “Heraclitean flux” of phenomena necessitates a non-anthropocentric inquiry into the invariant structures of mathematical objects within the flow of experience.
        - name: "Proof Mining"
          room: "Lecture Room 002"
          talks:
            - time: "15:45"
              title: "A worked example in proof mining in uniformly convex Banach spaces"
              speaker: "Andrei Sipos"
              id: "sipos-proof"
              abstract: |
                        Proof mining is a research paradigm, initiated by G. Kreisel and highly developed by U. Kohlenbach and his students and collaborators, which aims to apply proof-theoretic tools to extract computational content from ordinary proofs in mainstream mathematics (for more information on proof mining, see the book [1] and the recent survey [2]).
                        
                        Usually, the main obstacle that such activity presents is that the arguments frequently used by mathematicians appeal to highly infinitary principles that may not admit a simple computational interpretation. In functional analysis, this would translate into the existence of ‘ideal’ points such as limits (be they limits superior or inferior). A close viewing of the proof may show that the use of these ideal principles is not really needed for getting to the conclusion of the theorem, at the expense of making the argument slightly messier.

                        We present a pedagogical worked example that illustrates this methodology. We take a result of Prüss [3] which shows that uniform convexity of Banach spaces is equivalent to a different inequality governed by a modulus. The equivalence proof heavily uses limits superior. We explain how this may be rewritten into an argument that only uses inequalities of norms of ordinary points, and we show how it may be done quantitatively, deriving an expression of said modulus in terms of the modulus of uniform convexity.

                        [1] U. Kohlenbach, Applied proof theory: Proof interpretations and their use in mathematics, Springer Monographs in Mathematics, Springer-Verlag, 2008.
                        [2] Proof-theoretic methods in nonlinear analysis, Proceedings of the International Congress of Mathematicians 2018 (B. Sirakov, P. Ney de Souza and M. Viana, editors), vol. 2, World Scientific, 2019, pp. 61–82.
                        [3] Jan Prüss, A characterization of uniform convexity and applications to accretive operators, Hiroshima Mathematical Journal, vol. 11 (1981), no. 2, pp. 229–234.
            - time: "16:05"
              title: "Extracting bounds from proofs involving ultraproducts"
              speaker: "Morenikeji Neri"
              id: "neri-proof"
            - time: "16:25"
              title: $\mathbb{K}$ definitions as Matching Logic theories
              speaker: "Horatiu Cheval"
