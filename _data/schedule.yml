    - time: "10:45"
      type: "tutorial"
      room: "Lecture Room 002"
      title: "Logic, Geometry, and Computation: A Survey of expansions of additive structures"
      speaker: "Philipp Hieronymi"
      id: "philipp-hieronymi-3"
      abstract: |
                We survey recent results on expansions of Presburger arithmetic and of the ordered additive group of the reals. Such structures have long been studied by logicians and theoretical computer scientists for a variety of reasons. In this survey, we provide an overview of recent developments in the area and explain their relevance to model theory, theoretical computer science, and tame geometry.

                This series of talks aims partially update and connect the following earlier surveys: 'A Survey of Arithmetical Definability' by Alexis Bes, 'Open questions around Büchi and Presburger arithmetics" by Christian Michaux and Roger Villemaire and "Tameness in expansions of the real field' by Chris Miller.
    - time: "11:30"
      type: "break"
      title: "Room change"
    - time: "11:40"
      type: "tutorial"
      room: "Lecture Room 002"
      title: "Provability of Complexity Lower Bounds"
      speaker: "Rahul Santhanam"
      id: "rahul-santhanam-2"
      abstract: |
                P vs NP and related complexity lower bound questions have proven intractable so far, and it is natural to wonder if there are fundamental obstacles to their provability, such as analogues of the incompleteness results of Godel and Chaitin. I will discuss two frameworks within which such questions have been investigated - propositional proof complexity and bounded arithmetic. I will survey progress on the meta-mathematics of complexity lower bounds, as well as bottlenecks to progress. I will also discuss and speculate about connections between proof complexity and computational complexity, which relate the meta-mathematical questions to the underlying mathematical questions.
    - time: "12:45"
      type: "break"
      title: "Lunch break"
    - time: "14:15"
      type: "plenary"
      room: "Lecture Room 002"
      speaker: "Nicholas Pischke"
      id: "nicholas-pischke"
      title: "Extracting uniform bounds from noneffective proofs in probability theory"
      abstract: |
                Probability theory, at the surface, seems to require the use of proof-theoretically strong principles even to develop some of the most basic notions. Contrary to these perceived logical limitations, a systematic approach for extending the program of proof mining to this area has recently been proposed (cf. [2] as well as [1]), fundamentally based on the use of probability contents (i.e., finitely additive [0, 1]-valued measures defined on algebras of sets).

                    In this talk, I provide a high-level overview of the main ideas of this endeavor. In particular, I discuss how one can define extended systems of finite-type arithmetic tailored to probability contents, and how the outer measure can be used to provide a structured approach towards recognizing complex probabilistic statements formally in the language of the underlying theory. Combined with proof-theoretic tools like G ̈odel’s functional interpretation and Howard’s majorizability, these systems and translations give rise to new probabilistic logical metatheorems which allow for the extraction of computable and highly uniform bounds from (non-effective) proofs of probabilistic existence statements. Moreover, Kohlenbach’s uniform boundedness principle in that context allows for a tame access to continuity properties of the measure and facilitates an elimination of the principle of σ-additivity from proofs.

                 These metatheorems provide a logical explanation for the success of previous proof mining case studies, and in particular the various striking uniformities already observed in practice, and continue to prove themselves to be widely effective. I end by giving a brief overview of some of the central recent case studies, and indicating directions of current and future applied work stemming from these logical results.

                 [1] M. Neri, P. Oliva and N. Pischke, A systematic way of analysing proofs in probability theory, arXiv:2604.08078 (2026).
                 [2] M. Neri and N. Pischke, Proof mining and probability theory, Forum of Mathematics, Sigma, vol. 13 (2025), no. e187.
    - time: "15:15"
      type: "break"
      title: "Coffee break"
    - time: "15:45"
      type: "special"
      title: "Special Sessions"
      id: "proof-model-theory"
      tracks:
        - name: "Model Theory"
          room: "Robert Recorde (102)"
          organisers: "Pantelis Eleftheriou (Leeds) and Frank Wagner (Lyon)"
          talks:
            - time: "15:45"
              title: "Automatic definability of valuations from an order-topological perspective"
              speaker: "Anna de Mase"
              id: "demase-model-theory"
              abstract: |
                        An ordered abelian group $G$ (resp. a field $k$) has automatic ($\emptyset$)-definability if, in every henselian valued field with value group $G$ (resp. residue field $k$), the valuation is ($\emptyset$)-definable in the language of rings. In joint work with B. Boissonneau, F. Jahnke, and P. Touchard, we characterize such groups via the model-theoretic properties of weak and strong augmentability by infinitesimals, and such fields via t-henselianity, in characteristic~0. In this talk, I show that strong augmentability admits an order-topological formulation, and I discuss analogous questions for weak augmentability. I also present an order-topological formulation of t-henselianity in the setting of orderable fields, building on work of Prestel and Ziegler from 1978. The talk includes results from this joint work, as well as ongoing work with L. S. Krapp and S. Kuhlmann.

                        [1] Blaise Boissonneau, Anna De Mase, Franziska Jahnke and Pierre Touchard, Growing spines: ad infinitum et ad infinitesimalia, arXiv:2512.04932 (2025).
              
            - time: "16:25"
              title: "Cofibrant generation of pure monomorphisms in presheaf categories"
              speaker: "Mark Kamsma (Masaryk)"
              id: "kamsma-model-theory"
              abstract: |
                        The title of this talk, and its main result, are purely category-theoretic. However, we use model-theoretic methods to obtain the result. For a fixed monoid S, there is an algebraic question whether or not pure monomorphisms between sets with an S-action are cofibrantly generated. In (positive) model theory, we sometimes call pure monomorphisms immersions: those homomorphisms that reflect solutions to systems of equations. An earlier result by Lieberman, Vasey and Rosický established an equivalence between the existence of a stable independence relation on a category and cofibrant generation of a certain class of morphisms. We use this equivalence, as well as ideas of Mustafin, to characterise for which monoids S the class of pure monomorphisms is cofibrantly generated: those such that for every a, b ∈ S there is c ∈ S with a = cb or b = ca. Our methods directly go through in the greater generality of presheaf categories, hence the title, and main result, of the talk. This is joint work with Sean Cox, Jonathan Feigert, Marcos Mazari-Armida and Jiří Rosický.

            - time: "17:15"
              title: "Generalisations of Ax's theorem on pseudofinite fields"
              speaker: "Stefan Ludwig"
              id: "ludwig-model-theory"
              abstract: |
                        A pseudofinite field is an infinite model of the common theory of all finite fields in the language of rings. In 1968, James Ax, building on number-theoretic results, gave an axiomatization of the theory and proved its decidability, as well as a quantifier reduction. Hrushovski generalised this to the algebraic closures of finite fields equipped with a symbol for the Frobenius, and, more recently, to finite fields equipped with an additive character. Motivated by natural number-theoretic examples, we will present a further generalisation of the latter, and, if time permits, consider the theory arising from the combination of both of Hrushovski’s works.

        - name: "Pure and Applied Proof Theory"
          room: "Lecture Room 002"
          organisers: "Raheleh Jalali (Bath) and Andrei Sipos (Bucharest)"
          talks:
            - time: "15:45"
              title: "On the complexity of the Herbrand theorem"
              speaker: "Pavel Pudlak"
              id: "pudlak-proof-theory"
              abstract: |
                        The Herbrand theorem is a way to prove first order logically valid sentences \phi that are in the prenex form. The proof is a certain disjunction of term instances of the matrix of \phi, which is a propositional tautology. The structure of terms occurring in the disjunction may be very complex. We have studied the complexity of this structure using the Student-Teacher game. In this game Student proposes terms and Teacher proposes counterexamples. (If considered in pure predicate logic and viewed syntactically, Teacher just plays distinct free variables.) The game is defined using a finite tree in which nodes are plays of Teacher and edges are plays of Student. Furthermore, there is a linear order on the nodes, which determines how the game is played. One of our results says that for any such ordered tree T, a logically valid sentence can be constructed such that T is a substructure of any Herbrand proof.

                        This is a joint work with Sam Buss.

            - time: "16:25"
              title: "Automatic structures and the problem of natural well-orderings"
              speaker: "Lev Beklemishev"
              id: "beklemishev-proof-theory"
              abstract: |
                        We explore the idea of using automatic and other very efficient presentations of structures to deal with the conceptual problem of natural proof-theoretic ordinal notations. We conclude that this approach still does not meet the goals. Joint work with Fedor N. Pakhomov.# Paste verbatim text block 1 here.

            - time: "17:15"
              title: "Quantitative results on a generalized viscosity approximation method"
              speaker: "Paulo Firmino"
              id: "firmino-proof-theory"
              abstract: |
                        In this talk we present the results of a quantitative analysis of the asymptotic behaviour of the generalized Viscosity Approximation Method (genVAM), an iteration we studied in joint work with Leuştean. The genVAM iteration is a generalization of VAM, an iteration studied in Banach spaces by Xu et al. [7], to $W$-hyperbolic spaces and to families $(T_n)_{n\in\mathbb{N}}$ of mappings satisfying certain resolvent-like conditions (introduced by Leuştean, Nicolae and Sipoş [5] in their abstract analysis of the Proximal Point Algorithm). The genVAM iteration also generalizes the abstract HPPA studied by Aoyama, Kimura, Takahashi, and Toyoda [1], itself a generalization of the well-known Halpern-type Proximal Point Algorithm. We computed rates of ($(T_n)$-)asymptotic regularity, as well as rates of $T_m$-asymptotic regularity for all $m\in\mathbb{N}$. In this way, we extend to this very general setting the quantitative asymptotic regularity results we had obtained for the VAM iteration in Banach spaces [2]. Furthermore, as an application of a lemma due to Sabach and Shtern [6], linear such rates are computed for particular choices of the parameter sequences. On the setting of complete CAT(0) spaces, we compute rates of metastability for the abstract HPPA. We then, relying on results by Kohlenbach and Pinto [4], compute rates of metastability for genVAM, in doing so establishing a qualitative convergence result for the iteration. This talk reports on [3] recent joint work with Leuştean.

                        [1] K. Aoyama, Y. Kimura, W. Takahashi, and M. Toyoda, Approximation of common fixed points of a countable family of nonexpansive mappings in a Banach space, Nonlinear Analysis, vol. 67 (2007), pp. 2350–2360.
                        [2] P. Firmino and L. Leuştean, Quantitative asymptotic regularity of the VAM iteration with error terms for m-accretive operators in Banach spaces, Zeitschrift für Analysis und ihre Anwendugen, vol. 44 (2025), pp. 501–519.
                        [3] Quantitative results on a generalized viscosity approximation method, submitted, arXiv:2512.09968 [math.OC] (2025)
                        [4] U. Kohlenbach and P. Pinto, Quantitative translations for viscosity approximation methods in hyperbolic spaces, Journal of Mathematical Analysis and Applications, vol. 507 (2022), no. 2, 125823.
                        [5] L. Leuştean, A. Nicolae, and A. Sipoş, An abstract proximal point algorithm, Journal of Global Optimization, vol. 72 (2018), pp. 553–577.
                        [6] S. Sabach and S. Shtern, A first order method for solving convex bilevel optimization problems, SIAM Journal on Optimization, vol. 27 (2017), pp. 640–660.
                        [7] H.-K. Xu, N. Altwaijry, I. Alughaibi, and S. Chebbi, The viscosity approximation method for accretive operators in Banach spaces, Journal of Nonlinear and Variational Analysis, vol. 6 (2022), no. 1, pp. 37–50.
