        - name: "Set Theory"
          room: "Theory lab (209)"
          talks:
            - time: "11:40"
              title: "Generic reals and gauge dimensions"
              speaker: "Yiping Miao"
              id: "yiping-miao"
              abstract: |
                        Measure and category are two orthogonal notions. A typical element in a comeager set is generic, and a typical element in a conull set is random. There exists comeager null set, and the set of (Cohen) generic reals provide an example. The set also has Hausdorff dimension zero. However, the set has a perfect subset, suggesting largeness under certain measures. We consider an extended notion of Hausdorff dimension, using a gauge function to count how much an open ball contributes.

                        For any set of reals, the gauge profile of it is the set of gauge functions making the set measure positive. We will show that the complexity of the dense sets the generic meets corresponds nicely with the complexity of functions generating its gauge profile. Then we look at Sacks generics and Mathias generics. These two examples provide a comparison between gauge profile and the complexity of the collection of dense sets.

                        Time allows, we will also discuss the gauge profile of the set of reals compressible by 1/2. This is the random real analogue of the (Cohen) generic case. The set is known to have dimension 1/2 and our work shows the gauge profile is supported on its dimension.
            - time: "12:00"
              title: "Small large cardinals and neostability theory"
              speaker: "James E. Hanson"
              id: "james-hanson"
              abstract: |
                        Neostability theory is the branch of model theory that studies certain classes of combinatorially tame first-order theories and more generally local combinatorial tameness within arbitrary theories. These tameness notions are often intimately linked to the behavior of indiscernible sequences. We will discuss some recent applications of certain small large cardinals (between ineffable and Erdős) in model-theoretic neostability theory and in particular their use in building certain special indiscernible sequences.
